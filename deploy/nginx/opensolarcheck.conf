server {
    listen 80;
    listen [::]:80;
    server_name opensolarcheck.de www.opensolarcheck.de;

    # Certbot will add redirect to HTTPS here after setup
    # For now, serve the site on HTTP until SSL is configured

    root /var/www/opensolarcheck;
    index index.html;

    # Let Certbot verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/opensolarcheck;
    }

    # Static export: try file, then directory/index.html, then 404
    location / {
        try_files $uri $uri.html $uri/ /de.html;
    }

    # Default locale redirect
    location = / {
        return 302 /de;
    }

    # Cache static assets aggressively
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Custom 404
    error_page 404 /404.html;
}
